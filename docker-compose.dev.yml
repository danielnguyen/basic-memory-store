services:
  postgres:
    image: postgres:16
    container_name: pg-test
    environment:
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: memory_db
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_db"]
      interval: 2s
      timeout: 3s
      retries: 30

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-test
    ports:
      - "16333:6333"
      - "16334:6334"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6333/readyz"]
      interval: 2s
      timeout: 3s
      retries: 30

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm-test
    ports:
      - "4000:4000"
    env_file:
      - api/.env
    environment:
      - LITELLM_LOG=INFO
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 3s
      retries: 30