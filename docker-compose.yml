services:
  memory-db-postgres:
    image: postgres:16-alpine
    container_name: memory-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=memory_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=memory_db
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/postgres_data:/var/lib/postgresql/data"
      - "${_VOLUME_BASIC_MEMORY_STORE}/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro"
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_db"]
      interval: 2s
      timeout: 3s
      retries: 30

  memory-db-qdrant:
    image: qdrant/qdrant:latest-unprivileged
    container_name: memory-qdrant
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/qdrant_data:/qdrant/storage:rw"
    ports:
      - "16333:6333"
      - "16334:6334"
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':18BD .* 0A' /proc/net/tcp"]
      interval: 2s
      timeout: 3s
      retries: 30

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: memory-litellm
    restart: unless-stopped
    ports:
      - "14000:4000"
    environment:
      - LITELLM_LOG=INFO

      # Provider credentials
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/litellm/config.yaml:/app/config.yaml:ro}"
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':0FA0 .* 0A' /proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s


  basic-memory-store:
    image: danielnguyen/basic-memory-store:latest
    container_name: basic-memory-store
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      memory-db-postgres:
        condition: service_healthy
      memory-db-qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      - MEMORY_API_KEY=${MEMORY_API_KEY}

      # Postgres (internal DNS)
      - PG_DSN=postgresql://memory_user:${POSTGRES_PASSWORD}@memory-db-postgres:5432/memory_db

      # Qdrant (internal DNS)
      - QDRANT_URL=http://memory-db-qdrant:6333
      - QDRANT_COLLECTION=messages

      # LiteLLM (internal DNS)
      - LITELLM_BASE_URL=http://litellm:4000
      # - LITELLM_API_KEY=${LITELLM_API_KEY}

      # Models (LiteLLM-exposed model names)
      - CHAT_MODEL=gpt-4o-mini
      - EMBED_MODEL=text-embedding-3-small
      # Optional: if set, forwarded to LiteLLM. Leave unset to omit param (recommended for O-series).
      # - CHAT_TEMPERATURE=0.2

      # Indexing policy (reduce retrieval noise)
      - INDEX_USER_QUESTIONS=false
      - INDEX_ASSISTANT_MESSAGES=false

      # Context / retrieval
      - RECENT_TURNS=10
      - RETRIEVAL_K=8
      - MAX_CONTEXT_CHARS=12000
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/app_data:/app/data:rw"
    ports:
      - "11440:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30
