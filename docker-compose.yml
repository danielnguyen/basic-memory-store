networks:
  cloudflare-egress:
    external: true
    name: cloudflare-egress

  llm-memory-dmz:
    name: llm-memory-dmz
    driver: bridge
    internal: true

  llm-egress:
    name: llm-egress
    driver: bridge

services:
  memory-db-postgres:
    image: postgres:16-alpine
    container_name: memory-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=memory_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=memory_db
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/postgres_data:/var/lib/postgresql/data"
      - "${_VOLUME_BASIC_MEMORY_STORE}/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro"
    networks:
      - llm-memory-dmz
    # REMOVE ports to avoid host/LAN exposure
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_db"]
      interval: 2s
      timeout: 3s
      retries: 30

  memory-db-qdrant:
    image: qdrant/qdrant:latest-unprivileged
    container_name: memory-qdrant
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/qdrant_data:/qdrant/storage:rw"
    networks:
      - llm-memory-dmz
    # REMOVE ports to avoid host/LAN exposure
    expose:
      - "6333"
      - "6334"
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':18BD .* 0A' /proc/net/tcp"]
      interval: 2s
      timeout: 3s
      retries: 30

  memory-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: memory-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/minio_data:/data"
    networks:
      - llm-memory-dmz
    # REMOVE ports to avoid host/LAN exposure
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':2328 .* 0A' /proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: memory-litellm
    restart: unless-stopped
    environment:
      - LITELLM_LOG=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/litellm/config.yaml:/app/config.yaml:ro"
    networks:
      - llm-memory-dmz   # reachable by basic-memory-store
      - llm-egress       # outbound internet to OpenAI
    # REMOVE ports unless you truly need to access it from host
    expose:
      - "4000"
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':0FA0 .* 0A' /proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  basic-memory-store:
    image: danielnguyen/basic-memory-store:latest
    container_name: basic-memory-store
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      memory-db-postgres:
        condition: service_healthy
      memory-db-qdrant:
        condition: service_healthy
      memory-minio:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      - MEMORY_API_KEY=${MEMORY_API_KEY}
      - PG_DSN=postgresql://memory_user:${POSTGRES_PASSWORD}@memory-db-postgres:5432/memory_db
      - QDRANT_URL=http://memory-db-qdrant:6333
      - QDRANT_COLLECTION=messages
      - LITELLM_BASE_URL=http://litellm:4000
      - CHAT_MODEL=chat_voice_openai
      - EMBED_MODEL=embed
      - RECENT_TURNS=10
      - RETRIEVAL_K=8
      - MAX_CONTEXT_CHARS=12000
      - ARTIFACTS_OBJECT_PREFIX=artifacts
      - ARTIFACTS_PRESIGN_TTL_S=900
      - OBJECT_STORE_ENABLED=true
      - OBJECT_STORE_ENDPOINT=http://memory-minio:9000
      - OBJECT_STORE_BUCKET=memory-artifacts
      - OBJECT_STORE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - OBJECT_STORE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - OBJECT_STORE_REGION=us-east-1
      - OBJECT_STORE_PRESIGN_BASE_URL=${OBJECT_STORE_PRESIGN_BASE_URL}
      - ARTIFACTS_MAX_SIZE_BYTES=104857600
      - ARTIFACTS_ALLOWED_MIME=image/png,image/jpeg,image/webp,application/pdf,text/plain,text/markdown,application/json,application/zip
    volumes:
      - "${_VOLUME_BASIC_MEMORY_STORE}/app_data:/app/data:rw"
    networks:
      - llm-memory-dmz
      - cloudflare-egress
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':1F40 .* 0A' /proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
